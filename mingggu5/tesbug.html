<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Latihan Debugging</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
    .container { padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
    .result { margin-top: 15px; padding: 10px; background: #f0f0f0; border-radius: 4px; }
    .hidden { display: none; }
    .error-text { color: red; font-weight: bold; }
    button { padding: 8px 16px; background: #2F3C7E; color: white; border: none;
             border-radius: 4px; cursor: pointer; margin: 5px; }
    button:hover { background: #1a2555; }
    input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
    #product-list { list-style: none; padding: 0; }
    #product-list li { padding: 8px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <h1>Toko Online Mini</h1>
  <div class="container">
    <h2>Kalkulator Diskon</h2>
    <label>Harga (Rp): <input type="text" id="price" value="100000"></label><br><br>
    <label>Diskon (%): <input type="text" id="discount" value="20"></label><br><br>
    <button onclick="hitungDiskon()">Hitung</button>
    <div class="result" id="result">Hasil akan muncul di sini</div>
  </div>


  <div class="container" style="margin-top:20px">
    <h2>Daftar Produk</h2>
    <button onclick="loadProducts()">Muat Produk</button>
    <ul id="product-list"></ul>
  </div>


  <div class="container" style="margin-top:20px">
    <h2>Pencarian Produk</h2>
    <input type="text" id="search" placeholder="Cari produk...">
    <button onclick="searchProduct()">Cari</button>
    <div class="result" id="search-result"></div>
  </div>


<script>
  // ===== BUG 1: Kesalahan tipe data =====
  function hitungDiskon() {
    let harga = document.getElementById("price").value;  // Bug: string, bukan number
    let diskon = document.getElementById("discount").value;
    let potongan = harga * diskon / 100;
    let total = harga - potongan;  // Bug: string concatenation bukan subtraction
    document.getElementById("result").innerText =
      "Potongan: Rp " + potongan + " | Total: Rp " + total;
  }


  // ===== BUG 2: Variabel undefined & typo =====
  function loadProducts() {
    let products = [
      { nama: "Laptop", harga: 15000000 },
      { nama: "Mouse", harga: 250000 },
      { nama: "Keyboard", harga: 500000 },
      { nama: "Monitor", harga: 3500000 }
    ];
    let list = document.getElementById("product-list");
    list.innerHTML = "";
    for (let i = 0; i <= products.length; i++) {  
      let item = document.createElement("li");
      item.textContent = products[i].nama + " - Rp " +
        products[i].harga.toLocaleString();
      list.appendChild(item);
    }
  }


  // ===== BUG 3: Logic error =====
  function searchProduct() {
    let keyword = document.getElementById("search").value;
    let products = ["Laptop", "Mouse", "Keyboard", "Monitor", "Headset"];
    let found = products.find(p => p === keyword);  // Bug: case-sensitive exact match
    let resultDiv = document.getElementById("search-result");
    if (found) {
      resultDiv.innerText = "Ditemukan: " + found;
      resultDiv.classList.remove("error-text");
    } else {
      resultDiv.innerText = "Produk tidak ditemukan!";
      resultDiv.classList.add("error-text");
    }
  }
</script>
</body>
</html>
